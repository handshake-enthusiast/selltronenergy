<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historical Funding Rates</title>

  <style>
    :root {
      --background: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --accent: #2563eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, #eef4ff 0, transparent 420px),
        var(--background);
      color: var(--text);
    }

    main {
      width: 100%;
      max-width: 580px;
      padding: 44px 36px;
      text-align: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.08);
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--accent);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(32px, 6vw, 44px);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.55;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      max-width: 100%;
      padding: 12px 18px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #f8fafc;
      color: var(--accent);
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      overflow-wrap: anywhere;
      transition: border-color 0.15s ease, background 0.15s ease, transform 0.15s ease;
    }

    a:hover {
      background: #eff6ff;
      border-color: #bfdbfe;
      transform: translateY(-1px);
    }

    @media (max-width: 520px) {
      main {
        padding: 34px 24px;
        border-radius: 20px;
      }

      a {
        border-radius: 16px;
      }
    }
  </style>
</head>

<body>
  <main>
    <div class="eyebrow">New version available</div>
    <h1>Historical Funding Rates</h1>
    <p>Discontinued in favor of the new version.</p>

    <a href="https://investors.selltron.energy/funding-rates">
      https://investors.selltron.energy/funding-rates
    </a>
  </main>
</body>

</html>
